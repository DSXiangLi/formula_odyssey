name: AI自动化测试

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # 每天凌晨3点运行完整测试
    - cron: '0 3 * * *'

jobs:
  ai-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - name: Install dependencies
        working-directory: src
        run: |
          npm ci
          npm install -D @playwright/test
          npx playwright install chromium

      - name: Install AI service dependencies
        run: |
          npm install -g typescript

      - name: Build project
        working-directory: src
        run: npm run build

      - name: Run AI自动化测试
        working-directory: src/tests
        run: npx playwright test
        env:
          TEST_BASE_URL: http://localhost:5173
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          SKIP_WEB_SERVER: 'false'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-results
          path: |
            src/tests/reports/
            src/test-results/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/tests/reports/playwright-report/

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'src/tests/reports/ai-test-report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('Test report not found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const { summary } = report;

            const passRate = ((summary.passed / summary.total) * 100).toFixed(1);
            const status = summary.failed === 0 ? '✅ 通过' : '❌ 失败';

            const body = `## 🤖 AI自动化测试结果

            **状态**: ${status}

            | 指标 | 数值 |
            |------|------|
            | 总用例 | ${summary.total} |
            | 通过 | ${summary.passed} |
            | 失败 | ${summary.failed} |
            | 跳过 | ${summary.skipped} |
            | 通过率 | ${passRate}% |

            ### 📊 测试覆盖
            ${report.aiInsights.coverage}

            ### 💡 AI建议
            ${report.aiInsights.recommendations.map(r => `- ${r}`).join('\n')}

            ${report.aiInsights.riskAreas.length > 0 ? `
            ### ⚠️ 风险区域
            ${report.aiInsights.riskAreas.map(r => `- 🔴 ${r}`).join('\n')}
            ` : ''}

            [查看完整报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ AI自动化测试失败",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🤖 AI自动化测试失败"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*分支:*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*提交:*\n${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "查看详情"
                      },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
