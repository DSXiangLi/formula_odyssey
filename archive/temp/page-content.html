<!DOCTYPE html><html lang="zh-CN"><head>
  <script type="module" src="/@vite/client"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="中医方书 - Formula Scrolls - 中医方剂学习游戏">
  <title>中医方书 - Formula Scrolls</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #game-container {
      position: relative;
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16/9;
      background: #0a0a0a;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .game-title {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #f5f0e6;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .game-subtitle {
      font-size: 1.2rem;
      color: #c73e3a;
      margin-bottom: 2rem;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(199, 62, 58, 0.3);
      border-top-color: #c73e3a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 1rem;
      color: #888;
    }

    .loading-progress {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .loading-progress-bar {
      height: 100%;
      background: #c73e3a;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    #error-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 2rem;
    }

    #error-screen.visible {
      display: flex;
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .error-title {
      font-size: 1.5rem;
      color: #c73e3a;
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 1rem;
      color: #888;
      text-align: center;
      max-width: 500px;
    }

    @media (max-width: 768px) {
      #game-container {
        aspect-ratio: 9/16;
        max-width: 100%;
        border-radius: 0;
      }

      .game-title {
        font-size: 2rem;
      }

      .game-subtitle {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- 游戏画布 -->
    <canvas id="game-canvas" width="1440" height="900" style="touch-action: none; width: 1440px; height: 900px;"></canvas>

    <!-- 加载界面 -->
    <div id="loading-screen" class="hidden">
      <h1 class="game-title">中医方书</h1>
      <p class="game-subtitle">Formula Scrolls</p>
      <div class="loading-spinner"></div>
      <p class="loading-text">正在加载游戏资源...</p>
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loading-progress-bar" style="width: 100%;"></div>
      </div>
    </div>

    <!-- 错误界面 -->
    <div id="error-screen">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">加载失败</h2>
      <p class="error-message" id="error-message">抱歉，游戏加载时遇到了问题。请刷新页面重试。</p>
    </div>
  </div>

  <script type="module" src="/src/index.ts"></script>


</body></html>
